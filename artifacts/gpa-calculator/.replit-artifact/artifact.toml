kind = "web"
previewPath = "/"
title = "내신 계산기 & 특목고 입시 컨설팅"
version = "1.0.0"
id = "artifacts/gpa-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22920

[services.development]
run = "pnpm --filter @workspace/gpa-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gpa-calculator", "run", "build" ]
publicDir = "artifacts/gpa-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22920"
BASE_PATH = "/"
